name: Build Patched Music Assistant

on:
  schedule:
    - cron: '0 0 * * *' # Check daily at midnight
  workflow_dispatch:   # Allow manual trigger

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Get latest release tag
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/music-assistant/server/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Strip the 'v' from tag for version string
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout upstream code
        uses: actions/checkout@v4
        with:
          repository: music-assistant/server
          ref: ${{ steps.upstream.outputs.tag }}
          path: upstream

      - name: Checkout this repo (for the patch)
        uses: actions/checkout@v4
        with:
          path: patch-repo

      - name: Apply Patch
        working-directory: upstream
        run: |
          git apply ../patch-repo/variable_playback.patch

      - name: Modify Dockerfile to build from source
        working-directory: upstream
        run: |
          # The official Dockerfile expects wheels in dist/
          # We'll change it to install from source since we just patched it.
          
          # Replace the wheel install with source install
          sed -i '/ARG MASS_VERSION/,/music-assistant@dist/c\COPY . /app/source\nRUN uv pip install /app/source' Dockerfile
          
          # Remove the bytecode compilation of the wheel path and point to the new site-packages
          sed -i 's|music_assistant$||' Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Patched Image
        uses: docker/build-push-action@v5
        with:
          context: ./upstream
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/music-assistant-server:latest
            ghcr.io/${{ github.repository_owner }}/music-assistant-server:${{ steps.upstream.outputs.tag }}
          build-args: |
            MASS_VERSION=${{ steps.upstream.outputs.version }}
